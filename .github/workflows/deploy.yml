name: Deploy to IIS

on:
  push:
    branches:
      - deploy-test

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      # 🔹 Recycle ONLY your App Pool (SAFE)
      - name: Recycle IIS App Pool
        shell: powershell
        run: |
          Import-Module WebAdministration
          Restart-WebAppPool "CanteenAPI"
          Start-Sleep -Seconds 3

      # 🔹 Deploy files safely (NO Remove-Item)
      - name: Deploy Build to IIS
        shell: powershell
        run: |
          robocopy dist C:\inetpub\wwwroot\Canteen\CanteenAPI\dist /MIR
          robocopy . C:\inetpub\wwwroot\Canteen\CanteenAPI package.json web.config

          if ($LASTEXITCODE -lt 8) { exit 0 } else { exit 1 }

      - name: Install Production Dependencies
        working-directory: C:\inetpub\wwwroot\Canteen\CanteenAPI
        run: npm install --omit=dev
